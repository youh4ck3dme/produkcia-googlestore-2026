name: Integration Tests (Device)

on:
  push:
    branches: [main, master, develop, 'checkpoint/**']
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.7'
  JAVA_VERSION: '17'

jobs:
  integration-vm:
    name: Integration Tests (VM — bez Xcode)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --no-enable-swift-package-manager
      - run: flutter pub get
      - run: flutter test test/integration_mvp/ --dart-define=PLAY_MVP=true --dart-define=CI=true

  integration-android-build:
    name: Integration Tests (Android build smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: integration-vm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --no-enable-swift-package-manager
      - run: flutter pub get
      - run: yes | flutter doctor --android-licenses || true

      - name: Generate Supabase CI dart defines (optional)
        env:
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_TEST_PUBLISHABLE_KEY }}
        run: bash scripts/generate_supabase_ci_defines.sh dart_defines/supabase.ci.json

      - name: Build debug APK (compile smoke — bez emulatora)
        run: |
          EXTRA=""
          if [ -f dart_defines/supabase.ci.json ]; then
            EXTRA="--dart-define-from-file=dart_defines/supabase.ci.json"
          fi
          flutter build apk --debug \
            --dart-define=PLAY_MVP=true \
            --dart-define=CI=true \
            $EXTRA

  integration-macos-build:
    name: Integration Tests (macOS build smoke)
    runs-on: macos-15
    timeout-minutes: 30
    needs: integration-vm

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --no-enable-swift-package-manager
      - run: flutter pub get

      - name: Generate Supabase CI dart defines (optional)
        env:
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_TEST_PUBLISHABLE_KEY }}
        run: bash scripts/generate_supabase_ci_defines.sh dart_defines/supabase.ci.json

      - run: bash scripts/prepare_macos_integration.sh

      - name: Build debug macOS app (compile smoke — logika v integration-vm)
        run: |
          EXTRA=""
          if [ -f dart_defines/supabase.ci.json ]; then
            EXTRA="--dart-define-from-file=dart_defines/supabase.ci.json"
          fi
          flutter build macos --debug \
            --dart-define=PLAY_MVP=true \
            --dart-define=CI=true \
            $EXTRA
