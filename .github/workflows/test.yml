name: BizAgent AI Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Flutter Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze lib

      - name: Unit & widget tests
        run: flutter test --dart-define=PLAY_MVP=false

      - name: E2E / demo tests
        run: flutter test --dart-define=PLAY_MVP=false test/e2e/

      - name: Integration tests
        run: flutter test --dart-define=PLAY_MVP=false test/integration/

      - name: Performance tests
        run: flutter test --dart-define=PLAY_MVP=false test/performance/

      - name: Golden tests (check)
        run: flutter test --dart-define=PLAY_MVP=false test/golden/

  golden-update:
    name: Update golden files
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
      - run: flutter pub get
      - name: Update goldens
        run: flutter test test/golden/ --update-goldens
      - name: Upload golden artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goldens
          path: test/golden/goldens/
