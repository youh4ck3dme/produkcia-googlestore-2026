# BizAgent — Supabase projekt (GitHub integrácia / db push)
# Project ref: https://supabase.com/dashboard/project/xitittqtaeyazcpaylsz

project_id = "xitittqtaeyazcpaylsz"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[studio]
enabled = true
port = 54323

[auth]
site_url = "http://localhost:57300"
additional_redirect_urls = [
  "http://localhost:57300/**",
  "http://localhost:**/**",
  "http://127.0.0.1:**/**",
]
enable_signup = true

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"

[functions.generate-content]
verify_jwt = true
